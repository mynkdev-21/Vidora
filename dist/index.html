<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vidora</title>
  <style>
    body { margin:0; background:#06070d; display:flex; align-items:center; justify-content:center; height:100vh; font-family:system-ui; }
    .loader { text-align:center; }
    .spinner { width:40px; height:40px; border:3px solid rgba(167,139,250,0.2); border-top-color:#a78bfa; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .text { color:#94a3b8; font-size:13px; }
    .error { color:#f87171; font-size:12px; margin-top:12px; display:none; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p class="text">Loading Vidora...</p>
    <p class="error" id="err">Failed to load configuration. Check your internet connection.</p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
    import { getRemoteConfig, fetchAndActivate, getValue } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-remote-config.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA5ZFujZWpRdPd0nEpeyebzVhMnoN-5eGc",
      projectId: "vidora-f17fa",
      appId: "1:749910223768:android:c6dd28984a1745b28759ed",
    };

    try {
      const app = initializeApp(firebaseConfig);
      const remoteConfig = getRemoteConfig(app);
      remoteConfig.settings.minimumFetchIntervalMillis = 300000; // 5 min cache

      await fetchAndActivate(remoteConfig);
      const url = getValue(remoteConfig, 'desktop_url').asString();

      if (url) {
        window.location.href = url;
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('err').textContent = 'No desktop_url configured in Remote Config.';
        document.querySelector('.spinner').style.display = 'none';
      }
    } catch (e) {
      console.error('Remote Config error:', e);
      document.getElementById('err').style.display = 'block';
      document.querySelector('.spinner').style.display = 'none';
    }
  </script>
</body>
</html>
